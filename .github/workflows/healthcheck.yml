on:
  workflow_dispatch:
  schedule:
    - cron: 15 * * * *

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://full-stack-open-pokedex-qt43.onrender.com/health
          max-attempts: 5
          retry-delay: 30s

  notification:
    needs: [healthcheck]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord success
        if: ${{ needs.healthcheck.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: 'BRUH'
        uses: Ilshidur/action-discord@master
        with:
          args: 'Healthcheck for the project succeded.'
      - name: Notify Discord fail
        if: ${{ needs.healthcheck.result != 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: 'AYO PAUSE'
        uses: Ilshidur/action-discord@master
        with:
          args: 'Healthcheck for the project failed.'
